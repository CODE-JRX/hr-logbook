{% extends 'base.html' %}
{% block title %}Edit Client — HR Logbook{% endblock %}

{% block content %}
    <h2>Edit Client</h2>
    <form method="post">
        <div class="mb-3">
            <label class="form-label">Client ID</label>
            <input class="form-control" type="text" name="employee_id" value="{{ employee.employee_id }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Full name</label>
            <input class="form-control" type="text" name="full_name" value="{{ employee.full_name }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Department</label>
            <input class="form-control" type="text" name="department" value="{{ employee.department }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" name="gender">
                <option value="" {% if not employee.gender %}selected{% endif %}>-- Select --</option>
                <option value="Male" {% if employee.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if employee.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other" {% if employee.gender == 'Other' %}selected{% endif %}>Other</option>
                <option value="Prefer not to say" {% if employee.gender == 'Prefer not to say' %}selected{% endif %}>Prefer not to say</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input class="form-control" type="number" name="age" value="{{ employee.age or '' }}" min="0" max="150">
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Update</button>
            <a class="btn btn-outline-secondary" href="/employees">Back</a>
        </div>
    </form>
{% endblock %}
